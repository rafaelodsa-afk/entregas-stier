name: Backup do banco de dados

# Roda a cada 6h e também pode ser disparado manualmente (aba Actions do
# GitHub, botão "Run workflow") pra testar sem esperar o horário.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente do PostgreSQL (versão compatível com o Neon)
        # O Ubuntu padrão só tem pg_dump 16, e o Neon roda Postgres 18 — o
        # pg_dump recusa fazer dump de um servidor mais novo que ele mesmo.
        # Usa o repositório oficial do PostgreSQL pra pegar a versão certa.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-18

      - name: Gerar o dump e comprimir
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          pg_dump "${{ secrets.DATABASE_URL }}" --no-owner --no-privileges | gzip -9 > "stier-db-$TIMESTAMP.sql.gz"
          ls -lh "stier-db-$TIMESTAMP.sql.gz"

      - name: Configurar AWS CLI para o endpoint do R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto

      - name: Enviar o dump pro bucket de backup (R2)
        run: |
          aws s3 cp "stier-db-$TIMESTAMP.sql.gz" \
            "s3://${{ secrets.R2_BACKUP_BUCKET_NAME }}/banco/stier-db-$TIMESTAMP.sql.gz" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          echo "Backup salvo: banco/stier-db-$TIMESTAMP.sql.gz"
